<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Agape Academy</title>
    <link rel="shortcut icon" type="x-icon" href="Img/logo.jpg">
</head>
<body>
    <div class="info">
        <div class="img-card">
            <img src="Img/logo.jpg" alt="">
        </div>
        <label>Admin Console</label>
        <span>Secure management portal for Agape Academy International School educators and administrators.</span>
        <div class="address">
            <span>Excellence in Education</span>
            <span>Est. 1994</span>
        </div>
    </div>
    <div class="login">
        <div class="welcome">
            <label>Welcome Back</label>
            <span>Please enter your credentials to access the portal.</span>
        </div>
        <div class="inputs">
            <div class="email">
                <label>Username or Email</label>
                <input type="email" name="Emial" id="Email" placeholder="admin.name">
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
